<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Velvet 21</title>
    <script>
      try {
        const valid = ["modern","classic","royal","cherry","gold"];
        const stored = localStorage.getItem("blackjack-theme");
        document.documentElement.dataset.theme = valid.includes(stored) ? stored : "classic";
      } catch (e) {
        document.documentElement.dataset.theme = "classic";
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
